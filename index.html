<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Pufferfish Run</title>
    <style>
        @font-face {
            font-family: 'Press Start 2P';
            src: url('/assets/fonts/PressStart2P.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #050d18;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            width: 100%;
            height: 100%;
        }

        /* Prevent default touch behaviours (rubber-banding, zoom) */
        canvas {
            display: block;
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
